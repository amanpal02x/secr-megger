name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master

# Required permissions for Google Workload Identity Federation OIDC token exchange
permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    name: Build & Deploy Server and Client
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate to Google Cloud using OIDC Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Step 3: Set up Google Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Step 4: Create Artifact Registry Repository if it doesn't exist
      - name: Create Artifact Registry Repository
        run: |
          gcloud artifacts repositories create secr-megger \
            --repository-format=docker \
            --location=us-central1 \
            --description="Docker repository for SECR Megger v2" \
            || true

      # Step 5: Log in to Google Artifact Registry
      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Step 6: Set up Docker Buildx (enables caching and optimization)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6.5: Sanitize secrets to prevent any copy-paste newline/formatting issues
      - name: Sanitize Secrets
        run: |
          # Extract only the first line of MONGO_URI, and strip trailing return carriages or spaces
          CLEAN_URI=$(echo "${{ secrets.MONGO_URI }}" | head -n 1 | tr -d '\r' | tr -d '\n')
          echo "MONGO_URI=$CLEAN_URI" >> $GITHUB_ENV

      # ----------------------------------------------------
      # SERVER: BUILD, PUSH, AND DEPLOY
      # ----------------------------------------------------

      # Step 7: Build and Push Server Container Image
      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/secr-megger/server:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/secr-megger/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 8: Deploy Server to Google Cloud Run (Using env.MONGO_URI which is now guaranteed to be a single clean line)
      - name: Deploy Server to Cloud Run
        id: deploy-server
        run: |
          gcloud run deploy secr-megger-server \
            --image="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/secr-megger/server:${{ github.sha }}" \
            --region="us-central1" \
            --allow-unauthenticated \
            --no-cpu-throttling \
            --min-instances=1 \
            --set-env-vars="^|^MONGO_URI=$MONGO_URI|JWT_SECRET=${{ secrets.JWT_SECRET }}|SMS_ENABLED=${{ secrets.SMS_ENABLED }}|SMS_UNICODE=${{ secrets.SMS_UNICODE }}|SMS_PRIORITY=${{ secrets.SMS_PRIORITY }}|SMS_API_URL=${{ secrets.SMS_API_URL }}|SMS_USERNAME=${{ secrets.SMS_USERNAME }}|SMS_API_PASSWORD=${{ secrets.SMS_API_PASSWORD }}|SMS_SENDER_ID=${{ secrets.SMS_SENDER_ID }}|SMS_ENTITY_ID=${{ secrets.SMS_ENTITY_ID }}|DPAM_API_KEY=${{ secrets.DPAM_API_KEY }}|SUPABASE_URL=${{ secrets.SUPABASE_URL }}|SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
          
          # Extract the deployed service URL and pass it to subsequent steps
          URL=$(gcloud run services describe secr-megger-server --region=us-central1 --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ----------------------------------------------------
      # CLIENT: BUILD, PUSH, AND DEPLOY
      # ----------------------------------------------------

      # Step 9: Build and Push Client Container Image (passing Backend URL as build-arg)
      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            REACT_APP_API_URL=${{ steps.deploy-server.outputs.url }}
            REACT_APP_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            REACT_APP_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/secr-megger/client:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/secr-megger/client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 10: Deploy Client to Google Cloud Run
      - name: Deploy Client to Cloud Run
        run: |
          gcloud run deploy secr-megger-client \
            --image="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/secr-megger/client:${{ github.sha }}" \
            --region="us-central1" \
            --allow-unauthenticated
